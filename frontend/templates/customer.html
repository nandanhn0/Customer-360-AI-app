<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Customer 360</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="min-h-screen">

<header class="border-b border-[var(--line)] bg-white sticky top-0 z-10">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2 text-sm text-gray-500 hover:text-[var(--navy)]">
      <i data-lucide="arrow-left" class="w-4 h-4"></i> All accounts
    </a>
    <div class="flex items-center gap-3">
      <button id="exportBtn" class="text-xs flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-[var(--line)] hover:bg-gray-50">
        <i data-lucide="download" class="w-3.5 h-3.5"></i> Export summary
      </button>
      <button id="llmBtn" class="text-xs flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-[var(--navy)] text-white hover:opacity-90">
        <i data-lucide="sparkles" class="w-3.5 h-3.5"></i> Regenerate with LLM
      </button>
    </div>
  </div>
</header>

<main id="content" class="max-w-6xl mx-auto px-6 py-8"></main>

<script>
lucide.createIcons();
const customerId = {{ customer_id }};

function gaugeColor(score){
  if(score >= 75) return 'var(--green)';
  if(score >= 50) return 'var(--amber)';
  return 'var(--red)';
}
const priorityColor = { Critical: 'text-red-600 bg-red-50', High: 'text-amber-600 bg-amber-50', Medium: 'text-blue-600 bg-blue-50', Low: 'text-green-600 bg-green-50' };
const sentimentIcon = { Positive: 'smile', Neutral: 'meh', Mixed: 'shuffle', Negative: 'frown' };
const sourceIcon = { CRM: 'building-2', 'Support Ticket': 'life-buoy', Email: 'mail', Slack: 'hash', Payment: 'credit-card' };

function renderLoading(){
  document.getElementById('content').innerHTML = `
    <div class="skeleton h-8 w-1/3 mb-4"></div>
    <div class="skeleton h-24 w-full mb-6"></div>
    <div class="grid grid-cols-3 gap-4">
      <div class="skeleton h-40"></div><div class="skeleton h-40"></div><div class="skeleton h-40"></div>
    </div>`;
}

function render(data){
  const c = data.customer, s = data.signals;
  const usageSpark = sparkline(data.usage.map(u=>u.active_users));

  document.getElementById('content').innerHTML = `
    <div class="fade-in">
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
        <div>
          <h1 class="font-display text-2xl font-semibold text-[var(--navy)]">${c.name}</h1>
          <p class="text-sm text-gray-500 mt-1">${c.industry} · ${c.country} · ${c.segment} segment · CSM: ${c.owner}</p>
        </div>
        <div class="flex items-center gap-4">
          <div class="gauge" style="--pct:${s.health_score}; --gauge-color:${gaugeColor(s.health_score)}; width:84px; height:84px;">
            <span style="font-size:1.1rem">${s.health_score}</span>
          </div>
          <div>
            <div class="text-xs text-gray-400">Health Score</div>
            <span class="chip mt-1 ${priorityColor[s.priority]}">${s.priority} priority</span>
          </div>
        </div>
      </div>

      <div class="card p-5 mb-6 border-l-4" style="border-left-color:var(--teal)">
        <div class="flex items-center gap-2 mb-2 text-[var(--teal)]">
          <i data-lucide="bot" class="w-4 h-4"></i>
          <span class="text-xs font-semibold uppercase tracking-wide">AI Summary</span>
        </div>
        <p id="summaryText" class="text-sm text-gray-700 leading-relaxed">${s.summary}</p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="card p-5">
          <div class="flex items-center gap-2 mb-3 text-red-600"><i data-lucide="alert-triangle" class="w-4 h-4"></i><span class="text-xs font-semibold uppercase tracking-wide">Risks</span></div>
          ${s.risks.length ? `<ul class="space-y-2 text-sm text-gray-700">${s.risks.map(r=>`<li class="flex gap-2"><span class="text-red-400">•</span>${r}</li>`).join('')}</ul>` : `<p class="text-sm text-gray-400">No risks detected.</p>`}
        </div>
        <div class="card p-5">
          <div class="flex items-center gap-2 mb-3 text-green-600"><i data-lucide="trending-up" class="w-4 h-4"></i><span class="text-xs font-semibold uppercase tracking-wide">Opportunities</span></div>
          ${s.opportunities.length ? `<ul class="space-y-2 text-sm text-gray-700">${s.opportunities.map(o=>`<li class="flex gap-2"><span class="text-green-400">•</span>${o}</li>`).join('')}</ul>` : `<p class="text-sm text-gray-400">None flagged this period.</p>`}
        </div>
        <div class="card p-5">
          <div class="flex items-center gap-2 mb-3 text-[var(--navy)]"><i data-lucide="${sentimentIcon[s.sentiment]}" class="w-4 h-4"></i><span class="text-xs font-semibold uppercase tracking-wide">Sentiment &amp; Usage</span></div>
          <div class="text-sm text-gray-700 mb-3">Recent sentiment: <span class="font-semibold">${s.sentiment}</span></div>
          <div class="flex items-end gap-0.5 h-10">${usageSpark}</div>
          <div class="text-xs text-gray-400 mt-1">Active users, last 8 weeks</div>
        </div>
      </div>

      <div class="card p-5 mb-6 bg-[var(--navy)] text-white">
        <div class="flex items-center gap-2 mb-2 text-teal-300"><i data-lucide="compass" class="w-4 h-4"></i><span class="text-xs font-semibold uppercase tracking-wide">Recommended Next Best Action</span></div>
        <p class="text-sm leading-relaxed">${s.next_best_action}</p>
      </div>

      <div class="grid grid-cols-2 sm:grid-cols-5 gap-3 mb-6">
        ${Object.entries(data.sources).map(([k,v])=>`
          <div class="card p-3 text-center">
            <div class="font-display text-lg font-semibold text-[var(--navy)]">${v}</div>
            <div class="text-xs text-gray-500 capitalize">${k.replace('_',' ')}</div>
          </div>`).join('')}
      </div>

      <div class="card p-5">
        <div class="flex items-center gap-2 mb-4 text-[var(--navy)]"><i data-lucide="history" class="w-4 h-4"></i><span class="text-xs font-semibold uppercase tracking-wide">Recent Activity Timeline</span></div>
        <div class="space-y-4">
          ${data.timeline.map(t=>`
            <div class="flex gap-3">
              <div class="w-7 h-7 rounded-full bg-[var(--teal-soft)] flex items-center justify-center shrink-0 mt-0.5">
                <i data-lucide="${sourceIcon[t.source]||'circle'}" class="w-3.5 h-3.5 text-[var(--teal)]"></i>
              </div>
              <div>
                <div class="text-xs text-gray-400">${t.date} · ${t.source}</div>
                <div class="text-sm text-gray-700">${t.text}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
  lucide.createIcons();
}

function sparkline(values){
  const max = Math.max(...values, 1);
  return values.map(v => `<div class="flex-1 bg-[var(--teal)] rounded-t" style="height:${Math.max(8,(v/max)*100)}%; opacity:0.75"></div>`).join('');
}

async function load(useLlm=false){
  renderLoading();
  const res = await fetch(`/api/customer/${customerId}?llm=${useLlm ? 1 : 0}`);
  const data = await res.json();
  render(data);
}

document.getElementById('exportBtn').addEventListener('click', () => {
  window.location.href = `/api/customer/${customerId}/export`;
});
document.getElementById('llmBtn').addEventListener('click', () => load(true));

load();
</script>
</body>
</html>
